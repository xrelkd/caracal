[formatter.rust]
command  = "cargo"
options  = ["fmt", "--all", "--verbose", "--"]
includes = ["*.rs"]

[formatter.clang-format]
command  = "clang-format"
options  = ["-i", "--Werror", "--verbose"]
includes = ["*.proto"]

[formatter.biome]
command = "biome"
options = ["format", "--write"]
includes = [
  "*.css",
  "*.html",
  "*.js",
  "*.json",
  "*.jsx",
  "*.md",
  "*.mdx",
  "*.mjs",
  "*.scss",
  "*.ts",
  "*.tsx",
]

[formatter.prettier]
command  = "prettier"
options  = ["--write"]
includes = ["*.yaml", "*.yml"]

[formatter.toml]
command  = "taplo"
options  = ["format", "$@"]
includes = ["*.toml"]

[formatter.nix]
command  = "nixfmt"
includes = ["*.nix"]

[formatter.shell]
command = "sh"
options = ["-eucx", """
# Perform static analysis tool
shellcheck --external-sources --source-path=SCRIPTDIR "$@"

# Run formatter
shfmt --write --simplify --case-indent --indent 4 "$@"
    """, "--"]
includes = ["*.sh"]

[formatter.hcl]
command  = "hclfmt"
options  = ["-w"]
includes = ["*.hcl"]
