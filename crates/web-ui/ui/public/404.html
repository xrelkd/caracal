<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>404 - Lost in the Clouds</title>
    <style>
      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
        100% {
          transform: translateY(0px);
        }
      }
      .floating {
        animation: float 4s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="bg-slate-50 flex items-center justify-center h-screen font-sans">
    <div class="text-center px-6">
      <div class="floating mb-8">
        <h1 class="text-9xl font-extrabold text-slate-200">404</h1>
      </div>
      <h2 class="text-3xl font-bold text-slate-800 mb-4">You’ve drifted off course.</h2>
      <p class="text-slate-500 mb-8 max-w-md mx-auto">
        The page you are looking for has evaporated into thin air. Don't worry, even the best
        explorers get lost sometimes.
      </p>
      <a
        href="/"
        class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-full transition-all duration-300 shadow-lg hover:shadow-indigo-200"
      >
        Back to Safety
      </a>
    </div>
  </body>
</html>
